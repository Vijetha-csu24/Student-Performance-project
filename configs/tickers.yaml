# Semiconductor universe.
# `core` = used across all three objectives (regression, classification, clustering).
# `extended` = added for clustering (Objective 3) to reach 10 tickers.

core:
  - ticker: NVDA
    name: NVIDIA
    role: design
  - ticker: AMD
    name: Advanced Micro Devices
    role: design
  - ticker: INTC
    name: Intel
    role: idm
  - ticker: TSM
    name: Taiwan Semiconductor Manufacturing
    role: foundry
  - ticker: ASML
    name: ASML Holding
    role: equipment

extended:
  - ticker: QCOM
    name: Qualcomm
    role: design
  - ticker: AVGO
    name: Broadcom
    role: design
  - ticker: MU
    name: Micron Technology
    role: memory
  - ticker: TXN
    name: Texas Instruments
    role: idm
  - ticker: AMAT
    name: Applied Materials
    role: equipment

# Alpha Vantage News Sentiment covers ~2022-04 -> present.
# For regression/classification we constrain training to this window when sentiment is a feature.
date_range:
  start: "2022-04-01"
  end: "2025-12-31"
